name: Deploy Mobile PWA to Vercel

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify region model
        run: npm run verify:region

      - name: Check frontend JavaScript syntax
        run: |
          node --check public/js/cloudApi.js
          node --check clients/mobile-pwa/cloudApi.js
          node --check public/js/pages/Settings.js

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: clients/mobile-pwa
          vercel-args: '--prod'

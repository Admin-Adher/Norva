name: Deploy Norva Web to Vercel

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify region model
        run: npm run verify:region

      - name: Check frontend JavaScript syntax
        run: |
          node --check public/js/cloudApi.js
          node --check clients/mobile-pwa/cloudApi.js
          node --check public/js/pages/Settings.js

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (Production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_WEB_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_WEB_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}
        run: vercel deploy --prod --yes --token $VERCEL_TOKEN

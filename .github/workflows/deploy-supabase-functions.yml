name: Deploy Supabase Edge Functions

# Deploys the Supabase edge functions whenever they change on main (mirrors the
# Cloudflare web deploy). Per-function settings such as verify_jwt come from
# supabase/config.toml, so a blanket deploy keeps each function's auth config intact.
#
# One-time setup: add a repository secret SUPABASE_ACCESS_TOKEN
#   (GitHub → Settings → Secrets and variables → Actions → New repository secret).
#   Create the token at https://supabase.com/dashboard/account/tokens
#
# Note: database migrations are NOT auto-applied here (DDL on prod stays a
# deliberate, reviewed step) — only the edge functions are deployed.
#
# Transient failure: the CLI occasionally exits with `unexpected update function
# status 500: {"message":"Failed to set function store"}` on a single function
# (Supabase's function-store backend, not the bundle — bundling succeeds). It is
# transient; re-run this workflow (Actions → Run workflow, or push again). Only
# the affected function needs redeploying; the others report "No change found".
#
# 2026-07-01: correlated with Supabase incident "Project status change failures
# in multiple regions" — intermittent capacity issues where deploys "may fail
# intermittently or require one or more retries to complete successfully". Fix is
# to keep re-running until a run lands (no code change needed).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase-functions.yml'

jobs:
  deploy:
    name: Deploy edge functions
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: oupsceccxsonaalhueff
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pin the version: resolving "latest" lists GitHub releases, which is
          # rate-limited and intermittently fails the deploy ("Failed to resolve
          # latest Supabase CLI release: rate limit exceeded"). A pinned version
          # downloads that release directly and skips the lookup.
          version: 2.107.0

      - name: Require the deploy token
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set. Add it under Settings → Secrets and variables → Actions, then re-run."
            exit 1
          fi

      # Deploys every function in supabase/functions/; per-function verify_jwt and
      # import maps are read from supabase/config.toml.
      - name: Deploy all edge functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF"

name: Offsite DB backup to R2

# Offsite logical backup of the *managed* Supabase DB into Cloudflare R2.
# Read-only (pg_dump only). Doubles as the pre-built, proven Hetzner migration dump.
#
# ⚠️ SCHEDULE DISABLED (2026-07-11) — managed Supabase decommission (#41).
# This job targets the managed project (oupsceccxsonaalhueff), which is being
# retired now that Norva runs self-hosted (api.norva.tv). It had also NEVER run
# successfully: its repo secrets (SUPABASE_DB_URL, R2_*) were never set, so every
# nightly run exited 1 ("Set SUPABASE_DB_URL"). It was inert, not a safety net.
#
# The self-host DB has its own proven offsite backups (nightly dump + WAL PITR to
# R2 via systemd timers on the box, restore-tested — see ops/hetzner/backup/), so
# this GitHub pipeline is superseded. The `schedule` trigger is removed; kept as
# workflow_dispatch only. Delete this file once the managed project is deleted —
# see docs/DECOMMISSION-MANAGED-SUPABASE.md.

on:
  workflow_dispatch:
    inputs:
      prefix:
        description: 'R2 key prefix (default: db)'
        required: false
        default: 'db'

concurrency:
  group: db-backup-r2
  cancel-in-progress: false

jobs:
  backup:
    name: Dump managed DB and upload to R2
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL 17 client + age
        run: |
          set -euo pipefail
          echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client-17 age
          pg_dump --version
          aws --version   # aws-cli v2 is preinstalled on ubuntu-latest

      - name: Run offsite backup
        env:
          # Session pooler URI (IPv4-reachable, supports pg_dump) — NOT the direct
          # IPv6 host and NOT the transaction pooler (6543).
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          # Optional — if unset the archive is uploaded to the private bucket unencrypted.
          BACKUP_AGE_RECIPIENT: ${{ secrets.BACKUP_AGE_RECIPIENT }}
          R2_PREFIX: ${{ github.event.inputs.prefix || 'db' }}
          # Match the server major so pg_dump never version-mismatches.
          PG_DUMP: /usr/lib/postgresql/17/bin/pg_dump
          PG_DUMPALL: /usr/lib/postgresql/17/bin/pg_dumpall
        run: bash ops/backup/backup-to-r2.sh

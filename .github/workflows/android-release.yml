name: Android Release (AAB)

# Produces SIGNED release App Bundles (.aab) for Google Play upload.
# Run manually (Actions tab → "Run workflow") or by pushing a tag like v1.0.0.
# Requires these repository secrets (see clients/PLAY_STORE.md):
#   ANDROID_KEYSTORE_BASE64   - base64 of your upload keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD - keystore (store) password
#   ANDROID_KEY_ALIAS         - key alias inside the keystore
#   ANDROID_KEY_PASSWORD      - key password for that alias

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release-phone:
    name: Release Android Phone (AAB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is not set. Add the release keystore secrets first (see clients/PLAY_STORE.md)."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      # Firebase config for FCM push. Kept OUT of git (public repo + secret scanning) and written here
      # from the GOOGLE_SERVICES_JSON secret (paste the whole google-services.json as the secret value).
      # Absent → the conditional google-services plugin stays off and the build still succeeds (no push).
      - name: Write google-services.json (Firebase / FCM)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > clients/android-phone/app/google-services.json
            echo "Wrote google-services.json ($(wc -c < clients/android-phone/app/google-services.json) bytes)."
          else
            echo "::warning::GOOGLE_SERVICES_JSON secret not set — FCM plugin stays off in this build."
          fi

      - name: Build signed release AAB
        working-directory: clients/android-phone
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          # RevenueCat public SDK key for the PHONE app (goog_...). build.gradle reads
          # project.findProperty('REVENUECAT_API_KEY'); Gradle maps this ORG_GRADLE_PROJECT_
          # env var to that property. If the secret is empty, billing stays inert.
          ORG_GRADLE_PROJECT_REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY_PHONE }}
        run: gradle :app:bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: Norva-AndroidPhone-release-aab
          path: clients/android-phone/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 14

  release-tv:
    name: Release Android TV (AAB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is not set. Add the release keystore secrets first (see clients/PLAY_STORE.md)."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release AAB
        working-directory: clients/android-tv
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          # RevenueCat public SDK key for the TV app (goog_..., different from phone).
          # Same mechanism as the phone job (ORG_GRADLE_PROJECT_ → findProperty).
          ORG_GRADLE_PROJECT_REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY_TV }}
        run: gradle :app:bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: Norva-AndroidTV-release-aab
          path: clients/android-tv/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 14

name: build-libav-wasm

# Manually-triggered build of the custom "norva" libav.js WASM (the in-browser demux/remux engine),
# adding the MPEG-TS demuxer so .ts VOD remuxes in the browser instead of the slow gateway transcode.
# Runs here (not in the dev sandbox) because the sandbox's egress proxy truncates the ~1 GB
# Emscripten toolchain. Commits the rebuilt WASM back to the working branch.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to build on and commit the artifacts to
        required: true
        default: claude/webm-block-additions-error-pj16xm
  # API dispatch isn't available to the integration token, so also run when the build
  # script / this workflow changes on the feature branch (the WASM commit lands in a
  # different path, so it does not re-trigger).
  push:
    branches: [claude/webm-block-additions-error-pj16xm]
    paths:
      - scripts/build-libav-norva.sh
      - .github/workflows/build-libav-wasm.yml

permissions:
  contents: write

env:
  TARGET_REF: ${{ github.event.inputs.ref || github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.74

      - name: Build libav norva variant (+ mpegts)
        run: bash scripts/build-libav-norva.sh

      - name: Commit rebuilt WASM
        run: |
          # Canonical GitHub Actions bot identity. The old "ci@users.noreply.github.com" was the
          # legacy noreply address of the unrelated GitHub user @ci, so GitHub mis-attributed this
          # bot commit to that stranger and listed them as a repo "Contributor". This identity maps
          # to no real person.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/webengine/vendor/libav/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "build: libav norva WASM with MPEG-TS demuxer (in-browser .ts remux)"
            git push origin "HEAD:$TARGET_REF"
          fi

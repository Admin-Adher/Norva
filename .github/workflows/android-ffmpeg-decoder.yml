name: Build media3 FFmpeg audio decoder (LGPL)

# Builds the androidx.media3 FFmpeg AUDIO decoder extension as a self-built .aar
# with an LGPL-clean FFmpeg (audio decoders only, no --enable-gpl). Run manually
# (Actions -> "Run workflow"); it is NOT part of the normal release build (the
# FFmpeg compile is slow, and the .aar changes only when media3/FFmpeg is bumped).
#
# Flow: run this -> download the "media3-decoder-ffmpeg-lgpl-aar" artifact ->
# commit the .aar into clients/android-phone/app/libs/ (and android-tv if wanted)
# -> the next "Android Release (AAB)" build bundles it, and PlayerActivity's
# DefaultRenderersFactory(EXTENSION_RENDERER_MODE_ON) picks up FfmpegAudioRenderer.
#
# See clients/android-ffmpeg-decoder/README.md + NOTICE-LGPL.md.

on:
  workflow_dispatch:

jobs:
  build-decoder:
    name: Build FFmpeg audio decoder AAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install FFmpeg build deps (nasm/make)
        run: sudo apt-get update && sudo apt-get install -y nasm make pkg-config

      # NOTE: no local-cache — setup-ndk's cache restore loses the execute bits on
      # the toolchain binaries, so a cache-hit run fails FFmpeg's C-compiler test
      # ("clang is unable to create an executable file"). Downloading the NDK fresh
      # costs ~1 min and is reliable (run #1, pre-cache, passed this step; run #2,
      # cache-hit, failed it).
      - name: Set up Android NDK r26b
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Sanity-check the NDK toolchain
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          CLANG="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/clang"
          if ! "$CLANG" --version; then
            echo "::error:: NDK clang is not executable — toolchain install is broken."
            exit 1
          fi

      - name: Build decoder AAR (LGPL, audio-only)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          chmod +x clients/android-ffmpeg-decoder/build-ffmpeg-decoder.sh
          clients/android-ffmpeg-decoder/build-ffmpeg-decoder.sh

      - name: Upload decoder AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: media3-decoder-ffmpeg-lgpl-aar
          path: clients/android-ffmpeg-decoder/out/*.aar
          if-no-files-found: error
          retention-days: 90

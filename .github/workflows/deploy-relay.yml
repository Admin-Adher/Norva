name: Deploy Norva Relay Worker

# The relay Worker (services/norva-relay) carries playback through Cloudflare's
# residential-friendly edge and now rewrites open-ended seek ranges into bounded
# ones so browser Resume is instant. It deploys independently of the Pages site
# so a Workers-permission issue never masks the web deploy status.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/norva-relay/**'
      - '.github/workflows/deploy-relay.yml'

jobs:
  deploy:
    name: Deploy norva-relay to Cloudflare Workers
    runs-on: ubuntu-latest
    environment: Cloudflare
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.102.0'
          workingDirectory: services/norva-relay
          command: deploy

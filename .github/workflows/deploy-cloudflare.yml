name: Deploy Norva Web to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    environment: Cloudflare
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify region model
        run: npm run verify:region

      - name: Check frontend JavaScript syntax
        run: |
          node --check public/js/api.js
          node --check public/js/cloudApi.js
          node --check public/js/pages/WatchPage.js
          node --check public/js/norvaEngine.js

      - name: Cache-bust assets by content hash (rewrites ?v= to each file's hash)
        run: npm run hash:assets

      - name: Deploy public/ to Cloudflare Pages (norva-web)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.102.0'
          command: pages deploy public --project-name=norva-web --branch=main

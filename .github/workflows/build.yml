name: Build Norva

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-cloud-contracts:
    name: Verify cloud contracts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify region model
        run: npm run verify:region

      - name: Check frontend JavaScript syntax
        run: |
          node --check public/js/cloudApi.js
          node --check clients/mobile-pwa/cloudApi.js
          node --check public/js/pages/Settings.js

  build-windows:
    name: Build Windows Portable
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows portable
        run: npm run build:desktop

      - name: Upload Windows .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: Norva-Windows
          path: dist-desktop/*.exe
          if-no-files-found: error
          overwrite: true
          # Short retention: the Windows portable is large and was filling the
          # Actions artifact storage quota (which then fails every upload).
          retention-days: 5

  build-android:
    name: Build Android TV APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android TV debug APK
        working-directory: clients/android-tv
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload Android TV APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Norva-AndroidTV
          path: clients/android-tv/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          overwrite: true
          retention-days: 5

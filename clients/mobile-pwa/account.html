<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#080b12">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>Norva Account</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080b12;
      --surface: #11151d;
      --surface-2: #1a202b;
      --line: #273142;
      --text: #f8fafc;
      --muted: #a1a1aa;
      --accent: #4f7df3;
      --success: #34d399;
      --danger: #fb7185;
    }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: radial-gradient(circle at 50% 0%, rgba(79, 125, 243, 0.18), transparent 38%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: max(22px, env(safe-area-inset-top)) 18px max(22px, env(safe-area-inset-bottom));
      display: grid;
      align-items: center;
    }
    main {
      width: min(440px, 100%);
      margin: 0 auto;
    }
    .brand {
      text-align: center;
      margin-bottom: 24px;
    }
    .brand img {
      width: 72px;
      height: 72px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 28px;
      line-height: 1.1;
      margin-bottom: 8px;
    }
    .lead {
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }
    .panel {
      background: rgba(17, 21, 29, 0.94);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 8px;
      padding: 18px;
    }
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 16px;
    }
    .tab {
      min-height: 42px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-weight: 750;
    }
    .tab.active {
      background: #253044;
      color: var(--text);
    }
    .form { display: none; }
    .form.active { display: block; }
    label {
      display: block;
      color: #cbd5e1;
      font-size: 13px;
      font-weight: 650;
      margin: 0 0 6px;
    }
    .field { margin-bottom: 13px; }
    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0b0f16;
      color: var(--text);
      font: inherit;
      padding: 0 12px;
      outline: none;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79, 125, 243, 0.18); }
    .btn {
      width: 100%;
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      color: white;
      background: linear-gradient(135deg, #4f7df3, #6d5dfc 58%, #c75cff);
      font-weight: 800;
    }
    .btn.secondary {
      color: var(--text);
      background: #252b37;
      border: 1px solid var(--line);
      margin-top: 10px;
    }
    .ghost {
      width: 100%;
      min-height: 38px;
      border: 0;
      background: transparent;
      color: #bfdbfe;
      font-weight: 700;
      margin-top: 6px;
    }
    button:disabled { opacity: 0.65; }
    .status {
      display: none;
      margin-top: 13px;
      padding: 11px 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }
    .status.info { display: block; background: rgba(79, 125, 243, 0.1); color: #bfdbfe; }
    .status.success { display: block; background: rgba(52, 211, 153, 0.1); color: var(--success); border-color: rgba(52, 211, 153, 0.3); }
    .status.error { display: block; background: rgba(251, 113, 133, 0.1); color: var(--danger); border-color: rgba(251, 113, 133, 0.3); }
  </style>
</head>
<body>
  <main>
    <section class="brand">
      <img src="/icon-192.png" alt="Norva">
      <h1>Norva Account</h1>
      <p class="lead">Pair your phone, TV and web sessions with one cloud identity.</p>
    </section>

    <section class="panel">
      <div class="tabs" id="tabs">
        <button class="tab active" type="button" data-tab="signin">Sign in</button>
        <button class="tab" type="button" data-tab="signup">Create</button>
      </div>

      <form class="form active" id="signin-form">
        <div class="field">
          <label for="signin-email">Email</label>
          <input id="signin-email" type="email" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="signin-password">Password</label>
          <input id="signin-password" type="password" autocomplete="current-password" minlength="6" required>
        </div>
        <button class="btn" type="submit">Sign in</button>
        <button class="ghost" id="forgot-button" type="button">Forgot password</button>
      </form>

      <form class="form" id="signup-form">
        <div class="field">
          <label for="signup-name">Display name</label>
          <input id="signup-name" type="text" autocomplete="name" maxlength="80">
        </div>
        <div class="field">
          <label for="signup-email">Email</label>
          <input id="signup-email" type="email" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="signup-password">Password</label>
          <input id="signup-password" type="password" autocomplete="new-password" minlength="6" required>
        </div>
        <button class="btn" type="submit">Create account</button>
      </form>

      <form class="form" id="recover-form">
        <div class="field">
          <label for="recover-email">Email</label>
          <input id="recover-email" type="email" autocomplete="email" required>
        </div>
        <button class="btn" type="submit">Send recovery link</button>
        <button class="btn secondary" id="back-button" type="button">Back</button>
      </form>

      <form class="form" id="password-form">
        <div class="field">
          <label for="new-password">New password</label>
          <input id="new-password" type="password" autocomplete="new-password" minlength="6" required>
        </div>
        <button class="btn" type="submit">Update password</button>
      </form>

      <div class="status" id="status"></div>
    </section>
  </main>

  <script src="/cloudApi.js?v=1"></script>
  <script src="/authApi.js?v=1"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const returnTo = sanitizeReturnTo(params.get('returnTo')) || '/cloud.html';
    const statusEl = document.getElementById('status');
    const tabs = document.getElementById('tabs');
    const forms = {
      signin: document.getElementById('signin-form'),
      signup: document.getElementById('signup-form'),
      recover: document.getElementById('recover-form'),
      password: document.getElementById('password-form')
    };

    boot();

    document.querySelectorAll('.tab').forEach(button => button.addEventListener('click', () => showForm(button.dataset.tab)));
    document.getElementById('forgot-button').addEventListener('click', () => {
      document.getElementById('recover-email').value = document.getElementById('signin-email').value.trim();
      showForm('recover');
    });
    document.getElementById('back-button').addEventListener('click', () => showForm('signin'));

    forms.signin.addEventListener('submit', async event => {
      event.preventDefault();
      await withBusy(forms.signin, async () => {
        setStatus('info', 'Signing in...');
        await NorvaAuth.signIn({
          email: document.getElementById('signin-email').value.trim(),
          password: document.getElementById('signin-password').value
        });
        await ensureProfile();
        location.replace(returnTo);
      });
    });

    forms.signup.addEventListener('submit', async event => {
      event.preventDefault();
      await withBusy(forms.signup, async () => {
        const displayName = document.getElementById('signup-name').value.trim();
        setStatus('info', 'Creating account...');
        const payload = await NorvaAuth.signUp({
          displayName,
          email: document.getElementById('signup-email').value.trim(),
          password: document.getElementById('signup-password').value
        });
        if (NorvaAuth.getSession()) {
          await ensureProfile(displayName);
          location.replace(returnTo);
          return;
        }
        setStatus('success', payload.user || payload.id ? 'Check your email to confirm it, then sign in.' : 'Check your email to finish creating your account.');
        showForm('signin');
      });
    });

    forms.recover.addEventListener('submit', async event => {
      event.preventDefault();
      await withBusy(forms.recover, async () => {
        setStatus('info', 'Sending recovery link...');
        await NorvaAuth.recover(document.getElementById('recover-email').value.trim());
        setStatus('success', 'Recovery email sent.');
      });
    });

    forms.password.addEventListener('submit', async event => {
      event.preventDefault();
      await withBusy(forms.password, async () => {
        setStatus('info', 'Updating password...');
        await NorvaAuth.updatePassword(document.getElementById('new-password').value);
        location.replace(returnTo);
      });
    });

    async function boot() {
      const recovered = NorvaAuth.captureSessionFromUrl();
      if (params.get('mode') === 'recovery') {
        tabs.style.display = 'none';
        showForm('password');
        setStatus('info', 'Recovery session verified.');
        return;
      }
      if (recovered) {
        location.replace(returnTo);
        return;
      }
      const user = await NorvaAuth.getUser().catch(() => null);
      if (user) location.replace(returnTo);
    }

    async function ensureProfile(displayName) {
      await NorvaAuth.getAccessToken();
      const user = NorvaAuth.getSession()?.user;
      const name = displayName || user?.user_metadata?.display_name || user?.email?.split('@')[0] || '';
      await NorvaCloud.profile.save({ displayName: name, locale: navigator.language || 'fr-FR' }).catch(() => {});
    }

    function showForm(name) {
      Object.entries(forms).forEach(([key, form]) => form.classList.toggle('active', key === name));
      document.querySelectorAll('.tab').forEach(button => button.classList.toggle('active', button.dataset.tab === name));
      tabs.style.display = name === 'recover' || name === 'password' ? 'none' : 'grid';
      if (name !== 'password') statusEl.className = 'status';
    }

    async function withBusy(form, action) {
      const buttons = Array.from(form.querySelectorAll('button'));
      buttons.forEach(button => button.disabled = true);
      try {
        await action();
      } catch (error) {
        setStatus('error', error.message || 'Something went wrong.');
      } finally {
        buttons.forEach(button => button.disabled = false);
      }
    }

    function setStatus(type, message) {
      statusEl.className = 'status ' + type;
      statusEl.textContent = message;
    }

    function sanitizeReturnTo(value) {
      if (!value || !value.startsWith('/') || value.startsWith('//')) return '';
      return value;
    }
  </script>
</body>
</html>

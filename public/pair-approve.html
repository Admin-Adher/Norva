<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Approve pairing - Norva</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080B12;
      --surface: #18181f;
      --surface2: #27272f;
      --accent:  #3B82F6;
      --text:    #F8FAFC;
      --muted:   #94A3B8;
      --danger:  #ef4444;
      --success: #22c55e;
      --radius:  12px;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }

    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      padding-top: max(32px, env(safe-area-inset-top));
      padding-bottom: max(32px, env(safe-area-inset-bottom));
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 36px;
    }

    .logo img {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: block;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 28px 24px;
      text-align: center;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .code-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .pair-code {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: 8px;
      color: var(--accent);
      margin-bottom: 24px;
      font-variant-numeric: tabular-nums;
    }

    .device-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--surface2);
      font-size: 14px;
    }
    .device-row:last-of-type { border-bottom: none; margin-bottom: 24px; }
    .device-row .val { color: var(--muted); }

    .btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active  { opacity: 0.8; transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; margin-bottom: 10px; }
    .btn-ghost   { background: var(--surface2); color: var(--text); }

    .status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      display: none;
    }
    .status.error   { background: rgba(239,68,68,0.15);  color: var(--danger);  display: block; }
    .status.success { background: rgba(34,197,94,0.15);  color: var(--success); display: block; }
    .status.info    { background: rgba(59,130,246,0.15); color: var(--accent);  display: block; }

    .user-note {
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }
    .user-note strong { color: var(--text); }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Not-logged-in state */
    .login-note {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 16px;
    }
    .login-note a { color: var(--accent); text-decoration: none; }
  </style>
  <script src="/js/marketing-config.js?v=1"></script>
  <script defer src="/js/marketing.js?v=1"></script>
</head>
<body>
<div class="page">
  <div class="logo">
    <img src="/img/norva-app-icon.png" alt="Norva">
    Norva
  </div>

  <!-- Main approval card -->
  <div class="card" id="card-approve">
    <h1>Approve pairing</h1>
    <p class="subtitle">A screen wants to join your Norva ecosystem.</p>

    <div class="code-label">Pairing code</div>
    <div class="pair-code" id="display-code">——</div>

    <div class="device-row">
      <span>Device</span>
      <span class="val" id="display-device">Unknown</span>
    </div>
    <div class="device-row">
      <span>Hub</span>
      <span class="val" id="display-hub">—</span>
    </div>

    <p class="login-note" id="login-note" style="display:none">
      You are not signed in. <a href="/login.html" id="login-link">Sign in</a> to approve this pairing.
    </p>

    <button class="btn btn-primary" id="btn-approve">Approve screen</button>
    <button class="btn btn-ghost"   id="btn-deny">Deny</button>

    <div class="status" id="status-msg"></div>

    <p class="user-note" id="user-note" style="display:none">
      Approving as <strong id="display-user"></strong>
    </p>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ---- Parse params ----
  const params   = new URLSearchParams(location.search);
  const code     = params.get('code')   || '';
  const device   = params.get('device') || 'TV Device';

  // Hub origin is this page's own origin (served by the hub)
  const hubOrigin = location.origin;

  // ---- Populate UI ----
  document.getElementById('display-code').textContent   = code || '——';
  document.getElementById('display-device').textContent = device;
  document.getElementById('display-hub').textContent    = hubOrigin;

  // Auth token — may be stored in localStorage by the hub's own login flow
  const token = localStorage.getItem('authToken')
    || localStorage.getItem('hubToken')
    || '';

  // Try to decode user info from JWT
  let userName = '';
  if (token) {
    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      userName = payload.name || payload.email || payload.sub || '';
    } catch (_) {}
  }

  if (userName) {
    document.getElementById('user-note').style.display = 'block';
    document.getElementById('display-user').textContent = userName;
  }

  if (!token) {
    const note = document.getElementById('login-note');
    note.style.display = 'block';
    // Pre-fill the login redirect so it comes back here
    const loginLink = document.getElementById('login-link');
    loginLink.href = '/login.html?redirect=' + encodeURIComponent(location.href);
    document.getElementById('btn-approve').disabled = true;
  }

  if (!code) {
    setStatus('error', 'No pairing code found in URL. Please scan the QR code again.');
    document.getElementById('btn-approve').disabled = true;
  }

  // ---- Approve ----
  document.getElementById('btn-approve').addEventListener('click', async () => {
    if (!code) return;
    setStatus('info', '<span class="spinner"></span>Approving pairing…');
    document.getElementById('btn-approve').disabled = true;
    document.getElementById('btn-deny').disabled    = true;

    try {
      const res = await fetch('/api/pair/approve', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          ...(token ? { 'Authorization': 'Bearer ' + token } : {})
        },
        body: JSON.stringify({ code, device })
      });

      if (!res.ok) {
        const body = await res.text().catch(() => String(res.status));
        throw new Error('Server error ' + res.status + ': ' + body);
      }

      const json = await res.json().catch(() => ({}));

      // If the hub returns a token, persist it
      if (json.token) {
        localStorage.setItem('hubToken', json.token);
      }

      setStatus('success', 'Pairing approved! The device is now connected.');

      // Optional: redirect to hub home after a short delay
      setTimeout(() => {
        location.href = json.redirectUrl || '/';
      }, 2000);

    } catch (err) {
      setStatus('error', err.message);
      document.getElementById('btn-approve').disabled = false;
      document.getElementById('btn-deny').disabled    = false;
    }
  });

  // ---- Deny ----
  document.getElementById('btn-deny').addEventListener('click', async () => {
    document.getElementById('btn-approve').disabled = true;
    document.getElementById('btn-deny').disabled    = true;
    setStatus('info', 'Denying pairing request…');

    try {
      await fetch('/api/pair/deny', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          ...(token ? { 'Authorization': 'Bearer ' + token } : {})
        },
        body: JSON.stringify({ code })
      });
    } catch (_) {
      // Best-effort — ignore network errors on deny
    }

    setStatus('error', 'Pairing denied.');
    setTimeout(() => { location.href = '/'; }, 1500);
  });

  // ---- Helpers ----
  function setStatus(type, html) {
    const el = document.getElementById('status-msg');
    el.className = 'status ' + type;
    el.innerHTML = html;
  }
})();
</script>
</body>
</html>

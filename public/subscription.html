<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#090b10">
  <title>Your Norva subscription</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #090b10; --panel: #11151d; --line: #283246; --text: #f8fafc;
      --muted: #a8b3c7; --quiet: #6b7690; --accent: #5b7cfa; --coral: #ff8067;
      --pink: #b579ff; --green: #34d399; --amber: #fbbf24; --danger: #fb7185;
    }
    body { min-height: 100vh; background: var(--bg); color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      display: grid; place-items: center; padding: 22px; }
    .wrap { width: min(560px, 100%); }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
    .brand img { width: 40px; height: 40px; border-radius: 8px; }
    .brand span { font-size: 20px; font-weight: 800; }
    h1 { font-size: clamp(24px, 5vw, 34px); line-height: 1.1; margin-bottom: 18px; }
    .card { border: 1px solid var(--line); border-radius: 14px; padding: 24px; background: var(--panel); }
    .pill { display: inline-block; padding: 5px 12px; border-radius: 999px; font-size: 12px;
      font-weight: 800; text-transform: uppercase; letter-spacing: .04em; }
    .pill.ok { background: rgba(52,211,153,.15); color: var(--green); }
    .pill.warn { background: rgba(251,191,36,.15); color: var(--amber); }
    .pill.muted { background: rgba(255,255,255,.06); color: var(--muted); }
    .plan-name { font-size: 26px; font-weight: 800; margin: 14px 0 8px; }
    .detail { display: flex; justify-content: space-between; gap: 12px; padding: 12px 0;
      border-top: 1px solid var(--line); color: var(--muted); font-size: 14px; }
    .detail b { color: var(--text); font-weight: 700; text-transform: capitalize; }
    .msg { color: var(--muted); font-size: 15px; line-height: 1.6; margin: 14px 0 0; }
    .msg.warn { color: #fde8b0; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 22px; }
    .btn { min-height: 48px; border: 0; border-radius: 10px; padding: 0 20px; color: #fff;
      background: var(--accent); font: inherit; font-weight: 800; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; text-decoration: none; }
    .btn.ghost { background: #242c3d; color: #dbe7ff; border: 1px solid #344158; }
    .btn.warn { background: linear-gradient(135deg, var(--coral), var(--pink)); color: #0b1220; }
    .btn:focus-visible { outline: 3px solid var(--pink); outline-offset: 3px; }
    .note { color: var(--quiet); font-size: 12px; line-height: 1.5; margin-top: 16px; }
    .loading { color: var(--muted); padding: 24px 4px; }
    /* Cancel flow modal (reason → contextual counter-offer → confirm). */
    .modal-back { position: fixed; inset: 0; background: rgba(4,6,10,.72); display: grid;
      place-items: center; padding: 20px; z-index: 50; }
    .modal { width: min(460px, 100%); background: var(--panel); border: 1px solid var(--line);
      border-radius: 14px; padding: 22px; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 19px; margin-bottom: 4px; }
    .modal p { color: var(--muted); font-size: 14px; line-height: 1.55; margin: 8px 0 0; }
    .reasons { display: grid; gap: 8px; margin: 16px 0 2px; }
    .reasons label { display: flex; gap: 10px; align-items: center; border: 1px solid var(--line);
      border-radius: 10px; padding: 12px 14px; cursor: pointer; font-size: 14px; color: var(--text); }
    .reasons label:has(input:checked) { border-color: var(--pink); background: rgba(181,121,255,.08); }
    .offer { border: 1px solid rgba(52,211,153,.4); background: rgba(52,211,153,.08);
      border-radius: 12px; padding: 14px 16px; margin-top: 14px; font-size: 14px; line-height: 1.55; }
    .offer b { color: var(--green); }
    .btn.danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
    .linkish { background: none; border: 0; color: var(--quiet); font: inherit; font-size: 13px;
      cursor: pointer; text-decoration: underline; margin-top: 14px; display: inline-block; padding: 0; }
    html.tv .btn { min-height: 64px; font-size: 18px; }
  </style>
</head>
<body>
  <script>
    if (/NorvaTV-AndroidTV/i.test(navigator.userAgent || '')) { document.documentElement.classList.add('tv'); }
  </script>
  <main class="wrap">
    <div class="brand"><img src="/favicon.png" alt=""><span>Norva</span></div>
    <h1>Your subscription</h1>
    <div id="content"><div class="loading">Loading your subscription…</div></div>
    <p class="note" id="store-note"></p>
  </main>

  <script src="/js/cloudApi.js"></script>
  <script src="/js/authApi.js"></script>
  <script src="/js/billing-config.js?v=4"></script>
  <script src="/js/billing.js?v=9"></script>
  <script>
    // Return from a Stancer hosted checkout: finalize it (capture the tokenized card + start the
    // trial) with no webhook needed, then reload cleanly so the page renders the new trial state.
    (function () {
      var params = new URLSearchParams(location.search);
      if (params.get('stancer') !== 'done') return;
      (async function () {
        try { if (window.NorvaBilling && NorvaBilling.confirmStancer) await NorvaBilling.confirmStancer(); }
        catch (_) { /* the billing cron / a later visit will still reconcile */ }
        params.delete('stancer');
        var qs = params.toString();
        location.replace('/subscription.html' + (qs ? '?' + qs : ''));
      })();
    })();
  </script>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      // Only trust a same-site path for the "Back" button (guards against an open
      // redirect if returnTo were ever tampered with, and against landing on the
      // marketing site instead of the app).
      function safeLocalPath(v) { return (typeof v === 'string' && /^\/(?!\/)/.test(v)) ? v : '/app#home'; }
      const returnTo = safeLocalPath(params.get('returnTo'));
      const content = document.getElementById('content');
      const storeNote = document.getElementById('store-note');
      const SUB_STATUSES = ['trialing', 'active', 'cancelled_at_period_end', 'past_due', 'grace'];

      function el(tag, cls, text) {
        const e = document.createElement(tag);
        if (cls) e.className = cls;
        if (text != null) e.textContent = text;
        return e;
      }
      function fmtDate(iso) {
        if (!iso) return '—';
        try { return new Date(iso).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' }); }
        catch (_) { return '—'; }
      }
      function daysLeft(iso) {
        if (!iso) return null;
        return Math.ceil((new Date(iso).getTime() - Date.now()) / 86400000);
      }
      function planLabel(code) {
        const p = String(code || '').toLowerCase();
        if (p === 'family') return 'Norva Family';
        if (p === 'premium') return 'Norva Premium';
        if (!p || p === 'none' || p === 'free' || p === 'plus' || p === 'trial' || p === 'manual') return 'Norva';
        return 'Norva ' + p.charAt(0).toUpperCase() + p.slice(1);
      }
      function isNative() { try { return !!(window.NorvaBilling && window.NorvaBilling.isNative()); } catch (_) { return false; } }
      function manageUrl() { try { return (window.NorvaBilling && window.NorvaBilling.manageUrl && window.NorvaBilling.manageUrl()) || ''; } catch (_) { return ''; } }
      function hasUserSession() {
        try { const s = JSON.parse(localStorage.getItem('norva-cloud-session') || 'null'); return !!(s && s.user && s.user.id); }
        catch (_) { return false; }
      }
      function appUserId() {
        try { const s = JSON.parse(localStorage.getItem('norva-cloud-session') || 'null'); return s && s.user && s.user.id ? s.user.id : null; }
        catch (_) { return null; }
      }
      function subscribeHref() { return '/subscribe.html?returnTo=' + encodeURIComponent(returnTo); }

      async function getDecision() {
        const ent = window.NorvaCloud && window.NorvaCloud.entitlements;
        if (!ent) return null;
        try { return hasUserSession() ? await ent.get() : await ent.device(); }
        catch (_) { return null; }
      }

      function backBtn(label) {
        const a = el('a', 'btn ghost', label || 'Back to Norva');
        a.setAttribute('href', returnTo);
        return a;
      }
      // Platform-aware management link: Google Play on native, a billing portal on
      // web (inert until NORVA_BILLING_CONFIG.webCustomerPortalUrl is set).
      function manageButton(label, primary) {
        const url = manageUrl();
        if (!isNative() && !url) return null;
        const a = el('a', primary ? 'btn warn' : 'btn ghost', label || (isNative() ? 'Manage on Google Play' : 'Manage / cancel'));
        a.setAttribute('href', url || 'https://play.google.com/store/account/subscriptions');
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener');
        return a;
      }
      // Restore purchases (native/Play): re-link an existing entitlement after a
      // reinstall without re-paying. Only shown in a native shell where it applies.
      function restoreButton() {
        if (!isNative() || !(window.NorvaBilling && window.NorvaBilling.restore)) return null;
        const b = el('button', 'btn ghost', 'Restore purchases');
        b.addEventListener('click', async function () {
          b.disabled = true;
          const original = b.textContent;
          b.textContent = 'Restoring…';
          try {
            await window.NorvaBilling.restore({ appUserId: appUserId() });
            b.textContent = 'Restored — refreshing…';
            setTimeout(function () { location.reload(); }, 900);
          } catch (e) {
            if (storeNote) storeNote.textContent = 'Could not restore purchases' + (e && e.message ? ': ' + e.message : '') + '.';
            b.disabled = false;
            b.textContent = original;
          }
        });
        return b;
      }

      // Async, cosmetic: once the Stancer billing profile loads, slot a
      // "Payment method — •••• 1234" row into the card's details (web rail only).
      function appendPaymentMethod(card, decision) {
        try {
          const provider = String((decision.projection || {}).provider || '');
          if (provider !== 'stancer' || isNative()) return;
          if (!(window.NorvaBilling && window.NorvaBilling.stancerProfile)) return;
          window.NorvaBilling.stancerProfile().then(function (p) {
            if (!p) return;
            const msg = card.querySelector('.msg');
            function slot(node) { if (msg) card.insertBefore(node, msg); else card.appendChild(node); }
            if (p.card_last4) {
              const d = el('div', 'detail');
              d.appendChild(el('span', null, 'Payment method'));
              d.appendChild(el('b', null, '•••• ' + p.card_last4 + (p.card_exp ? ' · exp ' + p.card_exp : '')));
              slot(d);
            }
            // A pending save-offer discount (cancel flow) applies to the next charge.
            if (p.discount_next_pct) {
              const d2 = el('div', 'detail');
              d2.appendChild(el('span', null, 'Next payment'));
              d2.appendChild(el('b', null, p.discount_next_pct + '% off applied'));
              slot(d2);
            }
          }).catch(function () { /* cosmetic only */ });
        } catch (_) { /* cosmetic only */ }
      }

      // Self-serve controls for the web (Stancer) rail — native manages via Google Play.
      function isStancerWeb(decision) {
        return String((decision.projection || {}).provider || '') === 'stancer' && !isNative();
      }
      // Cancel via the API, with the reason from the cancel flow (analytics only).
      async function doCancel(reason) {
        try { await window.NorvaBilling.stancerCancel(reason || 'skipped'); location.reload(); }
        catch (e) {
          if (storeNote) storeNote.textContent = 'Could not cancel' + (e && e.message ? ': ' + e.message : '') + ' — please retry or contact support@norva.tv.';
        }
      }

      // Accessible modal scaffolding shared by the cancel flow and the past-due
      // confirm: focus trap, restore focus on close, Escape / backdrop close (with
      // the keydown listener always removed), and a re-focus after a step re-renders
      // the body. Returns { back, modal, close, focusFirst }.
      function buildModal() {
        const prevFocus = document.activeElement;
        const back = el('div', 'modal-back');
        const modal = el('div', 'modal');
        modal.setAttribute('role', 'dialog');
        modal.setAttribute('aria-modal', 'true');
        back.appendChild(modal);
        document.body.appendChild(back);
        function focusables() {
          return Array.prototype.slice.call(
            modal.querySelectorAll('button, a[href], input, select, textarea, [tabindex]')
          ).filter(function (n) { return !n.disabled && n.offsetParent !== null; });
        }
        function focusFirst() { const f = focusables()[0]; if (f) f.focus(); }
        let closed = false;
        function close() {
          if (closed) return; closed = true;
          mo.disconnect();
          document.removeEventListener('keydown', onKey, true);
          back.remove();
          try { if (prevFocus && prevFocus.focus) prevFocus.focus(); } catch (_) { /* noop */ }
        }
        function onKey(e) {
          if (e.key === 'Escape') { e.preventDefault(); close(); return; }
          if (e.key === 'Tab') {
            const f = focusables(); if (!f.length) return;
            const first = f[0], last = f[f.length - 1];
            if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
            else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
          }
        }
        // A step replaces modal.innerHTML wholesale → focus falls to <body>; pull it
        // back into the dialog so the trap and screen-reader context hold.
        const mo = new MutationObserver(function () {
          if (!modal.contains(document.activeElement)) focusFirst();
        });
        back.addEventListener('click', function (e) { if (e.target === back) close(); });
        document.addEventListener('keydown', onKey, true);
        mo.observe(modal, { childList: true });
        return { back: back, modal: modal, close: close, focusFirst: focusFirst };
      }

      // Cancel flow: reason → contextual counter-offer (50% off next payment / support)
      // → confirm. Cancelling stays honest and short: a "cancel now" path is reachable
      // from every step, and the offer is one-shot per customer (server-guarded).
      function openCancelFlow(decision) {
        const trialing = String(decision.status || '') === 'trialing';
        const m = buildModal();
        const back = m.back, modal = m.modal, close = m.close;

        let reason = 'skipped';
        const keepNote = trialing
          ? "You keep full access until your trial ends, and you won't be charged."
          : 'You keep full access until the end of the current period, and nothing further will be charged.';

        function actionsRow() { return el('div', 'actions'); }
        function keepButton() {
          const k = el('button', 'btn ghost', 'Keep my plan');
          k.addEventListener('click', close);
          return k;
        }
        function cancelNowButton(label) {
          const c = el('button', 'btn danger', label || 'Cancel my plan');
          c.addEventListener('click', function () { c.disabled = true; c.textContent = 'Cancelling…'; doCancel(reason); });
          return c;
        }

        function stepReason() {
          modal.innerHTML = '';
          modal.appendChild(el('h2', null, 'Before you go…'));
          modal.appendChild(el('p', null, 'Mind telling us the main reason? One tap — it really helps us improve Norva.'));
          const list = el('div', 'reasons');
          [['too_expensive', 'It costs too much'],
           ['not_using', "I'm not using it enough"],
           ['technical', "Something isn't working"],
           ['other', 'Another reason']].forEach(function (r) {
            const lab = el('label');
            const input = document.createElement('input');
            input.type = 'radio'; input.name = 'cancel-reason'; input.value = r[0];
            lab.appendChild(input);
            lab.appendChild(el('span', null, r[1]));
            list.appendChild(lab);
          });
          modal.appendChild(list);
          const row = actionsRow();
          const cont = el('button', 'btn', 'Continue');
          cont.addEventListener('click', function () {
            const sel = modal.querySelector('input[name="cancel-reason"]:checked');
            reason = sel ? sel.value : 'skipped';
            stepNext();
          });
          row.appendChild(cont);
          row.appendChild(keepButton());
          modal.appendChild(row);
          const skip = el('button', 'linkish', 'Skip and cancel now');
          skip.addEventListener('click', function () { reason = 'skipped'; stepConfirm(); });
          modal.appendChild(skip);
          m.focusFirst();
        }

        async function stepNext() {
          if (reason === 'technical') return stepSupport();
          if (reason !== 'too_expensive' && reason !== 'not_using') return stepConfirm();
          // Price/usage objections → the one-shot 50% counter-offer, if still available.
          let used = false;
          try {
            const p = window.NorvaBilling.stancerProfile ? await window.NorvaBilling.stancerProfile() : null;
            used = !!(p && (p.save_offer_used_at || p.discount_next_pct));
          } catch (_) { /* offer check is best-effort */ }
          if (used) return stepConfirm();
          stepOffer();
        }

        function stepOffer() {
          modal.innerHTML = '';
          modal.appendChild(el('h2', null, 'How about half price instead?'));
          const offer = el('div', 'offer');
          offer.appendChild(el('div', null, ''));
          offer.firstChild.innerHTML = 'Stay with Norva and get <b>50% off your ' + (trialing ? 'first' : 'next') +
            ' payment</b> — applied automatically, no code needed.';
          modal.appendChild(offer);
          modal.appendChild(el('p', null, 'One-time offer. Your plan and everything you set up stay exactly as they are.'));
          const row = actionsRow();
          const take = el('button', 'btn', 'Get 50% off and stay');
          take.addEventListener('click', async function () {
            take.disabled = true; take.textContent = 'Applying…';
            const r = await window.NorvaBilling.stancerSaveOffer(reason);
            if (r && r.ok) return stepSaved();
            stepConfirm("The offer isn't available on this account.");
          });
          row.appendChild(take);
          row.appendChild(cancelNowButton());
          modal.appendChild(row);
          const keep = el('button', 'linkish', 'Keep my plan as it is');
          keep.addEventListener('click', close);
          modal.appendChild(keep);
        }

        function stepSaved() {
          modal.innerHTML = '';
          modal.appendChild(el('h2', null, 'Done — 50% off your ' + (trialing ? 'first' : 'next') + ' payment 🎉'));
          modal.appendChild(el('p', null, "It's applied automatically. Thanks for staying with Norva."));
          const row = actionsRow();
          const ok = el('button', 'btn', 'Close');
          ok.addEventListener('click', function () { location.reload(); });
          row.appendChild(ok);
          modal.appendChild(row);
        }

        function stepSupport() {
          modal.innerHTML = '';
          modal.appendChild(el('h2', null, "Sorry about that — let's fix it"));
          modal.appendChild(el('p', null, 'Tell us what went wrong and we’ll help — most issues are sorted within a day. ' + keepNote));
          const row = actionsRow();
          const mail = el('a', 'btn', 'Contact support');
          mail.setAttribute('href', '/support.html?subject=' + encodeURIComponent('Issue before cancelling') +
            '&returnTo=' + encodeURIComponent('/subscription.html'));
          row.appendChild(mail);
          row.appendChild(cancelNowButton());
          modal.appendChild(row);
          const keep = el('button', 'linkish', 'Keep my plan');
          keep.addEventListener('click', close);
          modal.appendChild(keep);
        }

        function stepConfirm(note) {
          modal.innerHTML = '';
          modal.appendChild(el('h2', null, 'Cancel your plan?'));
          if (note) modal.appendChild(el('p', null, note));
          modal.appendChild(el('p', null, keepNote));
          const row = actionsRow();
          row.appendChild(cancelNowButton());
          row.appendChild(keepButton());
          modal.appendChild(row);
        }

        stepReason();
      }

      // "Cancel plan" — opens the cancel flow (past-due plans keep the direct
      // confirm: the offer doesn't apply while a payment is owed).
      function cancelButton(decision) {
        if (!isStancerWeb(decision) || !(window.NorvaBilling && window.NorvaBilling.stancerCancel)) return null;
        const b = el('button', 'btn ghost', 'Cancel plan');
        b.addEventListener('click', function () {
          const st = String(decision.status || '');
          if (st === 'past_due' || st === 'grace') {
            // Past-due plans skip the counter-offer (a payment is owed) — a short,
            // accessible confirm instead of a native window.confirm().
            const cm = buildModal();
            cm.modal.appendChild(el('h2', null, 'Cancel your plan now?'));
            cm.modal.appendChild(el('p', null, 'Your access ends immediately and nothing further is charged.'));
            const row = el('div', 'actions');
            const cancelNow = el('button', 'btn danger', 'Cancel plan');
            cancelNow.addEventListener('click', function () {
              cancelNow.disabled = true; cancelNow.textContent = 'Cancelling…';
              b.disabled = true; b.textContent = 'Cancelling…';
              doCancel('skipped');
            });
            const keep = el('button', 'btn ghost', 'Keep my plan');
            keep.addEventListener('click', cm.close);
            row.appendChild(cancelNow);
            row.appendChild(keep);
            cm.modal.appendChild(row);
            cm.focusFirst();
            return;
          }
          openCancelFlow(decision);
        });
        return b;
      }
      // "Update payment method" — labeled re-checkout that swaps the card token only.
      function updateCardLink(decision, primary) {
        if (!isStancerWeb(decision)) return null;
        const a = el('a', primary ? 'btn warn' : 'btn ghost', 'Update payment method');
        a.setAttribute('href', '/checkout.html?intent=update_card&returnTo=' + encodeURIComponent('/subscription.html'));
        return a;
      }
      // "Resume plan" — undoes a pending cancellation via the API (web/Stancer);
      // other rails keep the classic link to the plan picker.
      function resumeControl(decision) {
        if (isStancerWeb(decision) && window.NorvaBilling && window.NorvaBilling.stancerResume) {
          const b = el('button', 'btn', 'Resume plan');
          b.addEventListener('click', async function () {
            b.disabled = true; b.textContent = 'Resuming…';
            try { await window.NorvaBilling.stancerResume(); location.reload(); }
            catch (e) {
              b.disabled = false; b.textContent = 'Resume plan';
              if (storeNote) storeNote.textContent = 'Could not resume' + (e && e.message ? ': ' + e.message : '') + '.';
            }
          });
          return b;
        }
        const a = el('a', 'btn', 'Resume plan');
        a.setAttribute('href', subscribeHref());
        return a;
      }

      function detailRows(decision) {
        const proj = decision.projection || {};
        const frag = document.createDocumentFragment();
        const status = String(decision.status || proj.status || '—').replace(/_/g, ' ');
        const add = (label, value) => {
          const d = el('div', 'detail');
          d.appendChild(el('span', null, label));
          d.appendChild(el('b', null, value));
          frag.appendChild(d);
        };
        add('Plan', planLabel(decision.planCode || proj.plan_code));
        add('Status', status);
        const end = proj.trial_ends_at || proj.current_period_end;
        if (end) {
          const label = decision.status === 'cancelled_at_period_end' ? 'Access until'
            : decision.status === 'trialing' ? 'Trial ends' : 'Renews';
          add(label, fmtDate(end));
        }
        return frag;
      }

      function render(decision) {
        content.innerHTML = '';
        storeNote.textContent = isNative()
          ? 'Subscriptions are billed through Google Play — manage or cancel anytime in the Play Store.'
          : 'You can manage or cancel your subscription anytime.';

        // Not signed in.
        if (!decision) {
          const card = el('div', 'card');
          card.appendChild(el('p', 'msg', 'Sign in to see your Norva subscription.'));
          content.appendChild(card);
          const row = el('div', 'actions');
          const signin = el('a', 'btn', 'Sign in');
          signin.setAttribute('href', '/account.html?returnTo=' + encodeURIComponent(location.pathname + location.search));
          row.appendChild(signin);
          row.appendChild(backBtn('Back'));
          content.appendChild(row);
          storeNote.textContent = '';
          return;
        }

        // Dormant: billing not enforced yet (observe / Gate 0 / local hub) — BUT only
        // when there is no real membership on file. A real subscription (trial, active,
        // past due, …) still renders its true state below even while only observed, so
        // the return page after checkout reflects the actual trial, not "full access".
        const realStatus = String(decision.status || (decision.projection && decision.projection.status) || 'none').toLowerCase();
        const hasRealSub = SUB_STATUSES.indexOf(realStatus) !== -1;
        if ((decision.enforced === false || decision.mode === 'observe') && !hasRealSub) {
          const card = el('div', 'card');
          card.appendChild(el('span', 'pill muted', 'Active'));
          card.appendChild(el('div', 'plan-name', 'Norva'));
          card.appendChild(el('p', 'msg', "You have full access. Paid plans aren't switched on for Norva yet — there's nothing to manage for now."));
          content.appendChild(card);
          content.appendChild((function () { const r = el('div', 'actions'); r.appendChild(backBtn()); return r; })());
          storeNote.textContent = '';
          return;
        }

        const status = decision.status || (decision.projection && decision.projection.status) || 'none';
        const card = el('div', 'card');

        // Payment issue / grace — most urgent, takes precedence.
        if (status === 'past_due' || status === 'grace' || decision.reason === 'billing_grace') {
          card.appendChild(el('span', 'pill warn', 'Payment issue'));
          card.appendChild(el('div', 'plan-name', planLabel(decision.planCode)));
          card.appendChild(detailRows(decision));
          card.appendChild(el('p', 'msg warn', "We couldn't take your last payment. Update your payment method to keep watching — your access stays on during a short grace period."));
          content.appendChild(card);
          appendPaymentMethod(card, decision);
          const row = el('div', 'actions');
          // Web/Stancer → our own card-update flow; native → Google Play.
          const uc = updateCardLink(decision, true);
          if (uc) row.appendChild(uc);
          const mb = manageButton(isNative() ? 'Update on Google Play' : 'Update payment', true);
          if (mb) row.appendChild(mb);
          const cx = cancelButton(decision);
          if (cx) row.appendChild(cx);
          row.appendChild(backBtn('Back'));
          content.appendChild(row);
          return;
        }

        if (status === 'trialing') {
          const end = (decision.projection || {}).trial_ends_at || (decision.projection || {}).current_period_end;
          const dl = daysLeft(end);
          card.appendChild(el('span', 'pill ok', 'Free trial'));
          card.appendChild(el('div', 'plan-name', planLabel(decision.planCode)));
          card.appendChild(detailRows(decision));
          const left = (dl != null && dl >= 0) ? (dl === 0 ? 'Last day of your trial. ' : dl + ' day' + (dl === 1 ? '' : 's') + ' left. ') : '';
          card.appendChild(el('p', 'msg', left + "You won't be charged until your trial ends — cancel anytime before then."));
          content.appendChild(card);
        } else if (status === 'active') {
          card.appendChild(el('span', 'pill ok', 'Active'));
          card.appendChild(el('div', 'plan-name', planLabel(decision.planCode)));
          card.appendChild(detailRows(decision));
          content.appendChild(card);
        } else if (status === 'cancelled_at_period_end') {
          const end = (decision.projection || {}).current_period_end;
          card.appendChild(el('span', 'pill warn', 'Ending'));
          card.appendChild(el('div', 'plan-name', planLabel(decision.planCode)));
          card.appendChild(detailRows(decision));
          card.appendChild(el('p', 'msg', "Your plan won't renew and ends on " + fmtDate(end) + '. You can resume anytime before then.'));
          content.appendChild(card);
        } else {
          // none / expired / free — no active plan → win-back.
          card.appendChild(el('span', 'pill muted', 'No active plan'));
          card.appendChild(el('div', 'plan-name', 'Norva'));
          card.appendChild(el('p', 'msg', status === 'expired'
            ? 'Your Norva plan has ended. Resubscribe to keep watching on every screen.'
            : "You don't have an active Norva plan yet."));
          content.appendChild(card);
          const row = el('div', 'actions');
          const see = el('a', 'btn', status === 'expired' ? 'Resubscribe' : 'See plans');
          see.setAttribute('href', subscribeHref());
          row.appendChild(see);
          const rb0 = restoreButton();
          if (rb0) row.appendChild(rb0);
          row.appendChild(backBtn('Back'));
          content.appendChild(row);
          return;
        }

        appendPaymentMethod(card, decision);

        // Actions for trialing / active / cancelled.
        const row = el('div', 'actions');
        if (status === 'cancelled_at_period_end') {
          row.appendChild(resumeControl(decision));
        } else {
          const change = el('a', 'btn ghost', 'Change plan');
          change.setAttribute('href', subscribeHref());
          row.appendChild(change);
          const uc = updateCardLink(decision, false);
          if (uc) row.appendChild(uc);
        }
        const mb = manageButton();
        if (mb) row.appendChild(mb);
        if (status !== 'cancelled_at_period_end') {
          const cx = cancelButton(decision);
          if (cx) row.appendChild(cx);
        }
        const rb = restoreButton();
        if (rb) row.appendChild(rb);
        row.appendChild(backBtn('Back'));
        content.appendChild(row);
      }

      getDecision().then(render).catch(function () { render(null); });
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Norva — Payment received</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; display: grid; place-items: center; background: #0d1118;
      color: #a8b3c7; font-family: Inter, ui-sans-serif, system-ui, sans-serif; font-size: 14px; }
    .box { text-align: center; padding: 24px; }
    .ok { display: inline-grid; place-items: center; width: 42px; height: 42px; border-radius: 50%;
      background: rgba(52,211,153,.15); color: #34d399; font-size: 22px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="box"><span class="ok">✓</span><div>Payment received — finishing up…</div></div>
  <script>
    // Bridge page: Stancer redirects the checkout iframe here after payment.
    // Embedded → tell the parent checkout page (same-origin) to finalize via /confirm.
    // Opened top-level (3DS broke out of the iframe, or the "new tab" fallback) →
    // forward to the classic return flow on subscription.html.
    (function () {
      var q = new URLSearchParams(location.search);
      var rt = q.get('returnTo') || '';
      var safe = /^\/(?!\/)/.test(rt) ? rt : '';
      if (window.parent && window.parent !== window) {
        try { window.parent.postMessage({ type: 'norva:stancer:done' }, location.origin); } catch (_) { /* fallthrough */ }
      } else {
        location.replace('/subscription.html?stancer=done' + (safe ? '&returnTo=' + encodeURIComponent(safe) : ''));
      }
    })();
  </script>
</body>
</html>

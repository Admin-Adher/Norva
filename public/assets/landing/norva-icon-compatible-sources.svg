<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="96" height="96" viewBox="0 0 96 96"
     role="img" aria-labelledby="sources-title sources-desc"
     shape-rendering="geometricPrecision">
  <title id="sources-title">Compatible sources</title>
  <desc id="sources-desc">Connected links with a validation mark for compatible sources.</desc>

  <defs>
    <linearGradient id="sources-tile" x1="10" y1="8" x2="88" y2="91" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#222D59"/>
      <stop offset=".52" stop-color="#17213F"/>
      <stop offset="1" stop-color="#11182F"/>
    </linearGradient>

    <linearGradient id="sources-border" x1="12" y1="10" x2="86" y2="89" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5EEBDA" stop-opacity=".72"/>
      <stop offset=".48" stop-color="#6980FF" stop-opacity=".72"/>
      <stop offset="1" stop-color="#C66BFF" stop-opacity=".72"/>
    </linearGradient>

    <linearGradient id="sources-icon" x1="22" y1="22" x2="76" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#78F4E3"/>
      <stop offset=".46" stop-color="#7A8BFF"/>
      <stop offset="1" stop-color="#D778FF"/>
    </linearGradient>

    <linearGradient id="sources-accent" x1="25" y1="68" x2="73" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F27FB4"/>
      <stop offset=".52" stop-color="#9B6CFF"/>
      <stop offset="1" stop-color="#65E9D8"/>
    </linearGradient>

    <radialGradient id="sources-glow" cx=".33" cy=".24" r=".82">
      <stop offset="0" stop-color="#3A8FC2" stop-opacity=".26"/>
      <stop offset=".52" stop-color="#273C85" stop-opacity=".10"/>
      <stop offset="1" stop-color="#1A2140" stop-opacity="0"/>
    </radialGradient>

    <filter id="sources-shadow" x="-35%" y="-35%" width="170%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#050817" flood-opacity=".48"/>
    </filter>

    <filter id="sources-softGlow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Transparent outer area -->
  <g filter="url(#sources-shadow)">
    <rect x="6" y="6" width="84" height="84" rx="25"
          fill="url(#sources-tile)"
          stroke="url(#sources-border)" stroke-width="1.5"/>
    <rect x="8.5" y="8.5" width="79" height="79" rx="22.5"
          fill="url(#sources-glow)"
          stroke="#FFFFFF" stroke-opacity=".07"/>
  </g>

  
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Two connected links -->
    <g transform="rotate(-34 48 48)">
      <rect x="18" y="34" width="35" height="20" rx="10"
            stroke="url(#sources-icon)" stroke-width="4"/>
      <rect x="43" y="42" width="35" height="20" rx="10"
            stroke="url(#sources-icon)" stroke-width="4"/>
      <path d="M39 48 H58"
            stroke="url(#sources-icon)" stroke-width="4"/>
    </g>

    <!-- Confirmed compatibility -->
    <circle cx="70" cy="27" r="11"
            fill="#17213F" stroke="#70E9DA" stroke-width="2.5"
            filter="url(#sources-softGlow)"/>
    <path d="M65.5 27 L68.7 30.2 L74.8 23.8"
          stroke="#8AF4E6" stroke-width="3.2"/>
  </g>

</svg>

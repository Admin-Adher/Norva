<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="96" height="96" viewBox="0 0 96 96"
     role="img" aria-labelledby="sync-title sync-desc"
     shape-rendering="geometricPrecision">
  <title id="sync-title">Cloud synchronization</title>
  <desc id="sync-desc">Cloud with bidirectional arrows indicating cloud synchronization.</desc>

  <defs>
    <linearGradient id="sync-tile" x1="10" y1="8" x2="88" y2="91" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#222D59"/>
      <stop offset=".52" stop-color="#17213F"/>
      <stop offset="1" stop-color="#11182F"/>
    </linearGradient>

    <linearGradient id="sync-border" x1="12" y1="10" x2="86" y2="89" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5EEBDA" stop-opacity=".72"/>
      <stop offset=".48" stop-color="#6980FF" stop-opacity=".72"/>
      <stop offset="1" stop-color="#C66BFF" stop-opacity=".72"/>
    </linearGradient>

    <linearGradient id="sync-icon" x1="22" y1="22" x2="76" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#78F4E3"/>
      <stop offset=".46" stop-color="#7A8BFF"/>
      <stop offset="1" stop-color="#D778FF"/>
    </linearGradient>

    <linearGradient id="sync-accent" x1="25" y1="68" x2="73" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F27FB4"/>
      <stop offset=".52" stop-color="#9B6CFF"/>
      <stop offset="1" stop-color="#65E9D8"/>
    </linearGradient>

    <radialGradient id="sync-glow" cx=".33" cy=".24" r=".82">
      <stop offset="0" stop-color="#3A8FC2" stop-opacity=".26"/>
      <stop offset=".52" stop-color="#273C85" stop-opacity=".10"/>
      <stop offset="1" stop-color="#1A2140" stop-opacity="0"/>
    </radialGradient>

    <filter id="sync-shadow" x="-35%" y="-35%" width="170%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#050817" flood-opacity=".48"/>
    </filter>

    <filter id="sync-softGlow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Transparent outer area -->
  <g filter="url(#sync-shadow)">
    <rect x="6" y="6" width="84" height="84" rx="25"
          fill="url(#sync-tile)"
          stroke="url(#sync-border)" stroke-width="1.5"/>
    <rect x="8.5" y="8.5" width="79" height="79" rx="22.5"
          fill="url(#sync-glow)"
          stroke="#FFFFFF" stroke-opacity=".07"/>
  </g>

  
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Nuage -->
    <path d="M28 66
             H67
             C75 66 81 60 81 52
             C81 44.5 75.6 38.7 68.2 38
             C65.5 28.8 57.2 22 47.2 22
             C35.5 22 26 30.8 25.2 42.2
             C18.3 43.5 13 49.3 13 56.2
             C13 61.8 18.2 66 24 66"
          stroke="url(#sync-icon)" stroke-width="4"/>

    <!-- Synchronization arrows -->
    <path d="M34 45 H58 L53 40"
          stroke="url(#sync-accent)" stroke-width="4"/>
    <path d="M62 55 H38 L43 60"
          stroke="url(#sync-accent)" stroke-width="4"/>

    <!-- Point cloud actif -->
    <circle cx="71" cy="31" r="5.5"
            fill="#74EBDD" stroke="#D9FFFA" stroke-opacity=".55" stroke-width="1.3"
            filter="url(#sync-softGlow)"/>
  </g>

</svg>

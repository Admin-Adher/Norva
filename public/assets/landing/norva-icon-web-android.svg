<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="96" height="96" viewBox="0 0 96 96"
     role="img" aria-labelledby="devices-title devices-desc"
     shape-rendering="geometricPrecision">
  <title id="devices-title">Web and Android</title>
  <desc id="devices-desc">Browser, TV, phone and tablet representing the Web and Android ecosystem.</desc>

  <defs>
    <linearGradient id="devices-tile" x1="10" y1="8" x2="88" y2="91" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#222D59"/>
      <stop offset=".52" stop-color="#17213F"/>
      <stop offset="1" stop-color="#11182F"/>
    </linearGradient>

    <linearGradient id="devices-border" x1="12" y1="10" x2="86" y2="89" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5EEBDA" stop-opacity=".72"/>
      <stop offset=".48" stop-color="#6980FF" stop-opacity=".72"/>
      <stop offset="1" stop-color="#C66BFF" stop-opacity=".72"/>
    </linearGradient>

    <linearGradient id="devices-icon" x1="22" y1="22" x2="76" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#78F4E3"/>
      <stop offset=".46" stop-color="#7A8BFF"/>
      <stop offset="1" stop-color="#D778FF"/>
    </linearGradient>

    <linearGradient id="devices-accent" x1="25" y1="68" x2="73" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F27FB4"/>
      <stop offset=".52" stop-color="#9B6CFF"/>
      <stop offset="1" stop-color="#65E9D8"/>
    </linearGradient>

    <radialGradient id="devices-glow" cx=".33" cy=".24" r=".82">
      <stop offset="0" stop-color="#3A8FC2" stop-opacity=".26"/>
      <stop offset=".52" stop-color="#273C85" stop-opacity=".10"/>
      <stop offset="1" stop-color="#1A2140" stop-opacity="0"/>
    </radialGradient>

    <filter id="devices-shadow" x="-35%" y="-35%" width="170%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#050817" flood-opacity=".48"/>
    </filter>

    <filter id="devices-softGlow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Transparent outer area -->
  <g filter="url(#devices-shadow)">
    <rect x="6" y="6" width="84" height="84" rx="25"
          fill="url(#devices-tile)"
          stroke="url(#devices-border)" stroke-width="1.5"/>
    <rect x="8.5" y="8.5" width="79" height="79" rx="22.5"
          fill="url(#devices-glow)"
          stroke="#FFFFFF" stroke-opacity=".07"/>
  </g>

  
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Navigateur Web -->
    <rect x="19" y="22" width="58" height="36" rx="7"
          stroke="url(#devices-icon)" stroke-width="3.6"/>
    <path d="M19 32 H77"
          stroke="url(#devices-icon)" stroke-width="3"/>
    <circle cx="27" cy="27" r="1.8" fill="#72E9DA" stroke="none"/>
    <circle cx="33" cy="27" r="1.8" fill="#8190FF" stroke="none"/>

    <!-- Pied Android TV -->
    <path d="M42 58 V63 M33 65 H51"
          stroke="url(#devices-icon)" stroke-width="3.4"/>

    <!-- Mobile Android -->
    <rect x="19" y="50" width="18" height="29" rx="4.5"
          fill="#17213F" stroke="url(#devices-accent)" stroke-width="3.4"/>
    <circle cx="28" cy="74.5" r="1.4" fill="#83EEE0" stroke="none"/>

    <!-- Tablette Android -->
    <rect x="54" y="48" width="25" height="31" rx="5"
          fill="#17213F" stroke="url(#devices-accent)" stroke-width="3.4"/>
    <circle cx="66.5" cy="74.5" r="1.4" fill="#C684FF" stroke="none"/>
  </g>

</svg>

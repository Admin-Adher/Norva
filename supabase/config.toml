project_id = "oupsceccxsonaalhueff"

[functions.norva-cloud]
verify_jwt = false

[functions.norva-catalog]
verify_jwt = false

[functions.norva-playback]
verify_jwt = false

[functions.norva-source-sync]
verify_jwt = false

# Service-gated (NORVA_BACKFILL_TOKEN, verified in-function) series-info pre-warm crawler,
# driven by pg_cron. Fills cloud_series_info_cache from the gateway's single stable IP so the
# web never makes a live provider call for series-info. See docs/SERIES-INFO-CACHE.md.
[functions.norva-series-prewarm]
verify_jwt = false

# Service-gated (NORVA_BACKFILL_TOKEN) backfill that fills catalog_titles.original_language from
# TMDB (source language, e.g. 'ja' for anime), so the player resolves a VOSTFR/VO "original"
# audio track to its real language. Hits TMDB only, never the IPTV provider.
[functions.norva-tmdb-origlang]
verify_jwt = false

# RevenueCat sends our shared secret in the Authorization header (not a Supabase
# JWT), so the platform gateway check is disabled and the function verifies the
# secret itself via NORVA_REVENUECAT_WEBHOOK_AUTH.
[functions.norva-billing-webhook]
verify_jwt = false

# Supabase "Send Email Hook": called by the auth server (no user JWT) with a
# Standard-Webhooks signature, which the function verifies itself via
# SEND_EMAIL_HOOK_SECRET. Sends auth emails through Resend.
[functions.norva-auth-email]
verify_jwt = false

# Import-lifecycle digest sender, driven by pg_cron with our shared cron secret
# in the Authorization header (not a Supabase JWT). The gateway JWT check is
# disabled so the request reaches the function, which verifies the secret itself
# via norva_verify_cron_secret (same pattern as the source-sync crons).
[functions.norva-import-notify]
verify_jwt = false

# Privileged admin actions on users (resend confirmation / change role / suspend).
# The gateway JWT check is disabled so the OPTIONS preflight and the request reach
# the function, which verifies the caller is an admin itself (getUser + app_metadata
# .role === 'admin') before using the service role to act.
[functions.norva-admin]
verify_jwt = false

# Lifecycle / billing emails cron (welcome always; trial J-2 reminder, dunning, win-back
# gated behind NORVA_LIFECYCLE_BILLING_LIVE). Cron-authenticated via norva_verify_cron_secret.
[functions.norva-lifecycle]
verify_jwt = false

# Stancer (web payment rail) webhook. INERT until STANCER_SECRET_KEY is set. Verifies by re-fetching
# the payment_intent from Stancer (no trust in the raw body); optional ?t= URL token filter.
[functions.norva-stancer-webhook]
verify_jwt = false

# Revolut Merchant webhook — reconciles subscription/order events into the
# entitlement projection. No Supabase JWT (Revolut calls it); auth is the HMAC
# signature it verifies itself. INERT until REVOLUT_WEBHOOK_SIGNING_SECRET is set.
[functions.norva-revolut-webhook]
verify_jwt = false

# Revolut checkout — opens a trial-setup order, returns the RevolutCheckout widget
# token; /confirm finalizes without a webhook; /profile /cancel /resume for the
# manage UI. No Supabase JWT here (the function verifies the user JWT itself).
# INERT until REVOLUT_SECRET_KEY is set.
[functions.norva-revolut]
verify_jwt = false

# Revolut recurring-billing cron — the only place that charges a saved Revolut card
# (MIT). INERT until REVOLUT_SECRET_KEY is set. Cron-authenticated via
# norva_verify_cron_secret. Register the pg_cron job (see the file header).
[functions.norva-revolut-billing]
verify_jwt = false

# Stancer checkout + diagnostics. INERT until STANCER_SECRET_KEY is set. /health is open; /selftest is
# cron-authed and test-mode only; /checkout is user-authed (verifies the JWT itself).
[functions.norva-stancer]
verify_jwt = false

# Stancer recurring-billing cron — the only place that charges a saved card. INERT until
# STANCER_SECRET_KEY is set. Cron-authenticated via norva_verify_cron_secret.
[functions.norva-stancer-billing]
verify_jwt = false

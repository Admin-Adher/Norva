# =============================================================================
# Norva self-host — Kong declarative config (TEMPLATE)
# =============================================================================
# This is the Supabase self-host kong.yml, trimmed to the services Norva runs.
# It is a TEMPLATE: ${ANON_KEY} / ${SERVICE_ROLE_KEY} / ${DASHBOARD_USERNAME} /
# ${DASHBOARD_PASSWORD} are filled from ops/hetzner/.env by scripts/00-generate-kong.sh,
# which writes the real (secret) kong/kong.yml — that generated file is gitignored.
#
# Routes (Kong :8000, localhost-bound; front it with Caddy/Let's Encrypt for TLS):
#   /auth/v1/*      -> gotrue      (auth:9999)
#   /rest/v1/*      -> postgrest   (rest:3000)
#   /realtime/v1/*  -> realtime    (realtime:4000)
#   /storage/v1/*   -> storage     (storage:5000)
#   /functions/v1/* -> edge-runtime(functions:9000)   <- the 19 norva-* functions
#   /pg/*           -> pg-meta     (meta:8080)  (behind dashboard basic-auth)
# =============================================================================

_format_version: "2.1"
_transform: true

consumers:
  - username: DASHBOARD
  - username: anon
    keyauth_credentials:
      - key: ${ANON_KEY}
  - username: service_role
    keyauth_credentials:
      - key: ${SERVICE_ROLE_KEY}

acls:
  - consumer: anon
    group: anon
  - consumer: service_role
    group: admin

basicauth_credentials:
  - consumer: DASHBOARD
    username: ${DASHBOARD_USERNAME}
    password: ${DASHBOARD_PASSWORD}

services:
  # ---- GoTrue (auth) --------------------------------------------------------
  # Open endpoints (no key-auth): verify links, OAuth callback/authorize.
  - name: auth-v1-open
    url: http://auth:9999/verify
    routes:
      - name: auth-v1-open
        strip_path: true
        paths:
          - /auth/v1/verify
    plugins:
      - name: cors
  - name: auth-v1-open-callback
    url: http://auth:9999/callback
    routes:
      - name: auth-v1-open-callback
        strip_path: true
        paths:
          - /auth/v1/callback
    plugins:
      - name: cors
  - name: auth-v1-open-authorize
    url: http://auth:9999/authorize
    routes:
      - name: auth-v1-open-authorize
        strip_path: true
        paths:
          - /auth/v1/authorize
    plugins:
      - name: cors
  # Secured auth routes (key-auth + acl).
  - name: auth-v1
    _comment: "GoTrue: /auth/v1/* -> http://auth:9999/*"
    url: http://auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  # ---- PostgREST (REST API) -------------------------------------------------
  - name: rest-v1
    _comment: "PostgREST: /rest/v1/* -> http://rest:3000/*"
    url: http://rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  # ---- Realtime -------------------------------------------------------------
  - name: realtime-v1-ws
    _comment: "Realtime (websocket): /realtime/v1/* -> ws://realtime:4000/socket/*"
    url: http://realtime:4000/socket
    protocol: http
    routes:
      - name: realtime-v1-ws
        strip_path: true
        paths:
          - /realtime/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon
  - name: realtime-v1-rest
    _comment: "Realtime (REST): /realtime/v1/api/* -> http://realtime:4000/api/*"
    url: http://realtime:4000/api
    protocol: http
    routes:
      - name: realtime-v1-rest
        strip_path: true
        paths:
          - /realtime/v1/api
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  # ---- Storage --------------------------------------------------------------
  # No key-auth here: storage validates the JWT itself.
  - name: storage-v1
    _comment: "Storage: /storage/v1/* -> http://storage:5000/*"
    url: http://storage:5000/
    routes:
      - name: storage-v1-all
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: cors

  # ---- Edge Functions (the 19 norva-* functions) ----------------------------
  # No key-auth at the gateway: each function's verify_jwt (config.toml) governs
  # auth, exactly like on the managed project. The app calls these with the anon
  # key in the Authorization header, unchanged.
  - name: functions-v1
    _comment: "Edge Functions: /functions/v1/* -> http://functions:9000/*"
    url: http://functions:9000/
    routes:
      - name: functions-v1-all
        strip_path: true
        paths:
          - /functions/v1/
    plugins:
      - name: cors

  # ---- pg-meta (Studio backend) --------------------------------------------
  # Behind dashboard basic-auth (admin UI only; not used by the app).
  - name: meta
    _comment: "pg-meta: /pg/* -> http://meta:8080/*"
    url: http://meta:8080/
    routes:
      - name: meta-all
        strip_path: true
        paths:
          - /pg/
    plugins:
      - name: basic-auth
        config:
          hide_credentials: true
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin

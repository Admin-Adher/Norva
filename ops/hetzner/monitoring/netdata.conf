# =============================================================================
# Norva self-host monitoring — netdata.conf (minimal overrides only)
# =============================================================================
# Netdata reads /etc/netdata/netdata.conf; anything NOT set here falls back to
# the compiled-in default. We deviate on two things only: the display hostname
# and the web bind. Everything else (dbengine retention, collectors, health)
# uses Netdata's defaults. See MONITORING.md.
# =============================================================================

[global]
    hostname = norva-box

[web]
    # Loopback ONLY — the dashboard is reached through an SSH tunnel, never a
    # public port (MONITORING.md). ufw already blocks 19999 from the outside;
    # this bind is defense-in-depth so a firewall slip can't expose the box.
    bind to = 127.0.0.1:19999

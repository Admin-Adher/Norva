# =============================================================================
# Netdata go.d PostgreSQL collector — Norva self-host DB
# =============================================================================
# Netdata runs with network_mode: host, so it reaches the db container the same
# way psql on the box does: the port published to 127.0.0.1:5432.
#
# It connects as the read-only `netdata` role (pg_monitor) created by
# monitoring/setup-netdata-pg-role.sql — no write access, no row data, just
# stats/settings. The password is NOT stored here: go.d expands ${VAR} from the
# container environment at load time, and NETDATA_PG_PASSWORD is injected from
# ops/hetzner/.env by the compose file. Keeps the secret out of git.
# =============================================================================

update_every: 5

jobs:
  - name: norva-db
    dsn: 'postgres://netdata:${NETDATA_PG_PASSWORD}@127.0.0.1:5432/postgres?sslmode=disable'
    # Cluster-wide + per-database stats are collected from this one connection.
    # Per-table/index bloat metrics would require connecting into each database;
    # left at the default (off) to keep the collector light on a 900k-row catalog.

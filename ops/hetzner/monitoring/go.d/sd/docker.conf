# =============================================================================
# Disable go.d's DOCKER service-discovery pipeline.
# =============================================================================
# Left on, `sd:docker` auto-detects the Postgres container and creates a job
# using a GUESSED password → it can never authenticate and hammers the DB with
# failed logins ("password authentication failed for user netdata") every cycle,
# spamming the Postgres log. We don't need it: containers are already monitored
# via cgroups, and Postgres via our explicit, authenticated job (postgres.conf).
#
# This disables ONLY the docker pipeline — the net_listeners discovery (which
# usefully picks up Caddy's metrics endpoint) keeps running.
# =============================================================================
disabled: yes

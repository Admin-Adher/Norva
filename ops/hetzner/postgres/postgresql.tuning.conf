# =============================================================================
# Norva self-host — Postgres tuning (Hetzner)
# =============================================================================
# Mounted into the db container at /etc/postgresql/postgresql.conf.
# Pick ONE RAM tier block below (uncomment it), leave the COMMON block active.
#
# WHY these numbers: Norva's bottleneck is IO/RAM-cache-bound (measured 2026-07-07:
# hot set 2.9 GB > effective cache 1.5 GB -> continuous DataFileRead -> timeouts,
# with only 3 users). The single highest-leverage move is RAM >> hot working set.
# Once couche B dedup is ON, the hot set is O(panels) (~15-45 GB even at 10k users),
# so 128 GB has large headroom. See docs/roadmap/scaling-cost-hetzner-plan.md §7.
#
# supabase/postgres ships its own base config; this file REPLACES config_file, so
# it must be self-sufficient. If you prefer, append these as an include-dir drop-in
# instead of replacing — but then remove the `-c config_file=` from the compose.
# =============================================================================

# ---------------------------------------------------------------------------
# COMMON (all tiers) — grounded on the real workload
# ---------------------------------------------------------------------------
listen_addresses = '*'
max_connections = 200                 # REAL backends only. Thousands of CLIENTS
                                      # are multiplexed by PgBouncer/Supavisor.
                                      # Never let 10k users become 10k backends.

# SSD/NVMe planner costs (default random_page_cost=4 assumes spinning disk)
random_page_cost = 1.1
seq_page_cost = 1.0
effective_io_concurrency = 300        # NVMe can service many concurrent random reads

# Parallelism — current prod is starved at max_worker_processes=2; raise to ~cores
max_worker_processes = 16             # set ~= vCPU count of the box
max_parallel_workers = 16             # <= max_worker_processes
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4

# WAL / checkpoints — fewer checkpoint storms during import bursts
wal_compression = on
checkpoint_completion_target = 0.9
max_wal_size = 16GB
min_wal_size = 2GB

# Autovacuum — the import/dedup tables are high-churn; vacuum harder
autovacuum = on
autovacuum_max_workers = 4
autovacuum_vacuum_cost_limit = 2000
autovacuum_naptime = 20s

# Extensions Norva depends on (must be loadable). pg_cron runs in this DB.
shared_preload_libraries = 'pg_cron,pg_net,pg_stat_statements'
cron.database_name = 'postgres'

# Observability
pg_stat_statements.track = all
track_io_timing = on

# Statement timeouts are set PER ROLE (recreated by 03-recreate-cron-guc.sql):
#   ALTER ROLE anon          SET statement_timeout = '3s';
#   ALTER ROLE authenticated SET statement_timeout = '8s';
# Keep a sane global ceiling for maintenance/import roles (postgres role overrides
# it to a longer value only when running big index builds — see the session log).
statement_timeout = 120000            # 120s global default (ms)

# ---------------------------------------------------------------------------
# TIER: 64 GB RAM  (AX42 / Serverbörse / the i7-7700+64GB box) — ~100 users,
#                   cures today's timeouts. ACTIVE (this is the AX42-1 box).
# ---------------------------------------------------------------------------
shared_buffers = 16GB                 # ~25% RAM
effective_cache_size = 48GB           # ~75% RAM (planner: OS cache holds catalogue)
work_mem = 64MB                       # safe because max_connections is held low
maintenance_work_mem = 2GB
huge_pages = try

# ---------------------------------------------------------------------------
# TIER: 128 GB RAM  (AX102 / EX131 base) — 1k-10k deduped users.
#                    Uncomment this block (and comment the 64 GB one above) when
#                    you promote to the AX102.
# ---------------------------------------------------------------------------
# shared_buffers = 32GB               # ~25% RAM
# effective_cache_size = 96GB         # ~75% RAM
# work_mem = 128MB
# maintenance_work_mem = 2GB
# huge_pages = try

# ---------------------------------------------------------------------------
# TIER: 256 GB RAM  (EX131 / AX162-S max) — burst-import headroom + ECC registered.
#                    Do NOT go to 512 GB: deduped hot set is only 15-115 GB.
# ---------------------------------------------------------------------------
# shared_buffers = 64GB               # ~25% RAM
# effective_cache_size = 192GB        # ~75% RAM
# work_mem = 192MB
# maintenance_work_mem = 4GB
# huge_pages = on
# max_worker_processes = 48           # match EPYC 9454P 48c/96t
# max_parallel_workers = 48
